name: "Start Cloudrig"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_region: ${{ vars.TF_VAR_REGION }}
  TF_VAR_games_volume_size_gb: ${{ vars.TF_VAR_GAMES_VOLUME_SIZE_GB }}
  RESOURCE_NAME: ${{ vars.RESOURCE_NAME || 'cloudrig' }}

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.TF_VAR_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${RESOURCE_NAME}-terraform-state" \
            -backend-config="region=${TF_VAR_region}" \
            -backend-config="dynamodb_table=${RESOURCE_NAME}-terraform-locks"

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          region = "${TF_VAR_region}"
          resource_name = "${RESOURCE_NAME}"
          games_volume_size_gb = ${TF_VAR_games_volume_size_gb:-100}
          EOF

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Show connection info
        run: |
          echo "## Cloudrig is ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IP:** \`$(terraform output -raw instance_ip)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**RDP:** \`$(terraform output -raw rdp_command)\`" >> $GITHUB_STEP_SUMMARY
